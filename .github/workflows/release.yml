name: release

on:
  push:
    tags:
      - '*.*.*'

permissions:
  contents: write

jobs:
  build:
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 8.0.x

      - name: Publish
        run: >
          dotnet publish Klip.sln -c Release -o artifacts
          -p:Version=${{ github.ref_name }}
          -p:AssemblyVersion=${{ github.ref_name }}
          -p:FileVersion=${{ github.ref_name }}
          -p:InformationalVersion=${{ github.ref_name }}

      - name: Rename artifact
        shell: pwsh
        run: |
          Move-Item `
            "artifacts/Klip.exe" `
            "artifacts/Klip-${{ github.ref_name }}.exe"

      - name: Create release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            artifacts/Klip-${{ github.ref_name }}.exe
